<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Opening</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="../css/page-base.css">
  <link rel="stylesheet" href="../css/pages/opening.css">
</head>

<body>
  <main class="page page-opening">
<section class="page-grid opening-layout">
      <header class="opening-header">
        <div class="page-copy opening-hero opening-hero-spotlight">
          <h1>Wireless Mesh Fire Alarm System</h1>
        </div>
      </header>

      <div class="visual-card opening-stage-shell">
        <div class="opening-stage" aria-label="Opening stage">
          <div class="opening-player-host" id="opening-player-host" aria-label="Opening 3D mesh player"></div>
          <div
            class="opening-player-message"
            id="opening-player-message"
            role="status"
            aria-live="polite"
            hidden
          ></div>
        </div>
      </div>

      <div class="page-actions opening-actions">
        <button class="primary-button" data-action="goto" data-target="1">Start</button>
      </div>
    </section>
  </main>
<script src="../js/page-messaging.js"></script>
  <script src="../js/opening-page.js"></script>
</body>

</html>
