<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rapid Response</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/page-base.css">
  <link rel="stylesheet" href="../css/pages/response.css">
</head>
<body>
  <main class="page page-response" data-stage="accumulation">
<section class="page-grid response-layout page-stage-layout">
      <header class="response-header page-stage-header">
        <div class="page-copy response-hero response-hero-spotlight page-hero-spotlight">
          <h2>Rapid Response</h2>
        </div>
      </header>

      <div class="visual-card response-stage-shell" id="stage-trigger">
        <div class="response-stage" aria-label="Rapid response animation stage">
          <button type="button" class="response-reset-button" aria-label="Reset animation">
            <span class="response-reset-icon" aria-hidden="true"></span>
          </button>
          <div class="stage-overlay"></div>
          <div class="response-stage-frame">
            <div class="response-visual" id="animation-map">
              <!-- Mesh Nodes -->
              <div class="device node" id="node-left" style="top: 60%; left: 23%;">
                <div class="device-glow"></div>
                <div class="device-icon"></div>
              </div>
              <div class="device node" id="node-right" style="top: 54%; left: 63%;">
                <div class="device-glow"></div>
                <div class="device-icon"></div>
              </div>

              <!-- Detectors -->
              <div class="device det trigger-det" id="det-trigger" style="top: 43%; left: 46%;">
                <div class="device-glow"></div>
                <div class="device-icon"></div>
                <div class="trigger-label">ALARM SOURCE</div>
              </div>
              <div class="device det filler" style="top: 31%; left: 37%;"><div class="device-icon"></div></div>
              <div class="device det filler" style="top: 56%; left: 39%;"><div class="device-icon"></div></div>
              <div class="device det filler" style="top: 75%; left: 84%;"><div class="device-icon"></div></div>

              <!-- Sounders -->
              <div class="device sounder" style="top: 6%; left: 23%;"><div class="device-glow"></div><div class="device-icon"></div></div>
              <div class="device sounder" style="top: 14%; left: 67%;"><div class="device-glow"></div><div class="device-icon"></div></div>
              <div class="device sounder" style="top: 30%; left: 86%;"><div class="device-glow"></div><div class="device-icon"></div></div>
              <div class="device sounder" style="top: 44%; left: 9%;"><div class="device-glow"></div><div class="device-icon"></div></div>
              <div class="device sounder" style="top: 86%; left: 26%;"><div class="device-glow"></div><div class="device-icon"></div></div>
              <div class="device sounder" style="top: 89%; left: 57%;"><div class="device-glow"></div><div class="device-icon"></div></div>

            </div>
          </div>
        </div>
      </div>
    </section>
  </main>
<script src="../js/page-messaging.js"></script>
  <script src="../js/response-page.js"></script>
</body>
</html>
