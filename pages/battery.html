<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>10-Year Battery</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/page-base.css">
  <link rel="stylesheet" href="../css/pages/battery.css">
</head>
<body>
  <main class="page page-battery is-revealed">
    <section class="page-grid battery-layout">
      <header class="battery-header">
        <div class="page-copy battery-hero battery-hero-spotlight">
          <h2>10-Year Battery</h2>
        </div>
      </header>

      <div class="visual-card battery-main-stage-shell">
        <div class="battery-main-stage" aria-label="Battery feature stage">
          <div class="battery-feature-grid">
            <section class="battery-feature-column battery-feature-power" aria-labelledby="battery-power-title">
              <div class="battery-feature-card">
                <svg class="battery-card-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><polyline points="16 11 18 13 22 9"/></svg>
                <strong id="battery-power-title">1. Power Endurance</strong>
              </div>

              <div class="battery-mini-stage">
                <div class="power-demo power-demo-compact">
                  <div class="glowing-aura"></div>
                  <div class="big-battery animate-float">
                    <div class="battery-terminal"></div>
                    <div class="battery-fill">
                      <div class="flow-lines animate-bg-flow-slow"></div>
                    </div>
                    <svg class="zap-icon animate-zap" viewBox="0 0 24 24" fill="currentColor" stroke="none" aria-hidden="true"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"></polygon></svg>
                  </div>
                  <div class="demo-text demo-text-single">
                    <h4>Lithium Battery</h4>
                  </div>
                </div>
              </div>
            </section>

            <section class="battery-feature-column battery-feature-lowpower" aria-labelledby="battery-lowpower-title">
              <div class="battery-feature-card">
                <svg class="battery-card-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="4" y="4" width="16" height="16" rx="2" ry="2"/><rect x="9" y="9" width="6" height="6"/><line x1="9" y1="1" x2="9" y2="4"/><line x1="15" y1="1" x2="15" y2="4"/><line x1="9" y1="20" x2="9" y2="23"/><line x1="15" y1="20" x2="15" y2="23"/><line x1="20" y1="9" x2="23" y2="9"/><line x1="20" y1="14" x2="23" y2="14"/><line x1="1" y1="9" x2="4" y2="9"/><line x1="1" y1="14" x2="4" y2="14"/></svg>
                <strong id="battery-lowpower-title">2. Ultra-Low Power</strong>
              </div>

              <div class="battery-mini-stage">
                <div class="lowpower-demo lowpower-demo-compact">
                  <div class="circuit-area">
                    <svg viewBox="0 0 100 100" class="spin-rings" aria-hidden="true">
                      <circle cx="50" cy="50" r="45" fill="none" stroke="var(--page-accent)" stroke-width="0.5" stroke-dasharray="2 4" />
                      <circle cx="50" cy="50" r="35" fill="none" stroke="var(--page-accent)" stroke-width="0.5" stroke-dasharray="1 8" />
                    </svg>
                    <svg viewBox="0 0 200 200" class="flow-svg" aria-hidden="true">
                      <path d="M 100 20 L 100 70 M 100 180 L 100 130 M 20 100 L 70 100 M 180 100 L 130 100 M 40 40 L 75 75 M 160 160 L 125 125 M 160 40 L 125 75 M 40 160 L 75 125" fill="none" stroke="rgba(45,212,191,0.2)" stroke-width="1" />
                      <path d="M 100 20 L 100 70 M 100 180 L 100 130 M 20 100 L 70 100 M 180 100 L 130 100 M 40 40 L 75 75 M 160 160 L 125 125 M 160 40 L 125 75 M 40 160 L 75 125" fill="none" stroke="var(--page-accent)" stroke-width="1.5" stroke-dasharray="4 20" class="animate-flow-slow" />
                    </svg>
                    <div class="central-chip">
                      <div class="chip-inner"></div>
                      <svg class="cpu-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="4" y="4" width="16" height="16" rx="2" ry="2"/><rect x="9" y="9" width="6" height="6"/><line x1="9" y1="1" x2="9" y2="4"/><line x1="15" y1="1" x2="15" y2="4"/><line x1="9" y1="20" x2="9" y2="23"/><line x1="15" y1="20" x2="15" y2="23"/><line x1="20" y1="9" x2="23" y2="9"/><line x1="20" y1="14" x2="23" y2="14"/><line x1="1" y1="9" x2="4" y2="9"/><line x1="1" y1="14" x2="4" y2="14"/></svg>
                    </div>
                  </div>
                  <div class="demo-text demo-text-bottom">
                    <h4>Ultra-Low Consumption Design</h4>
                  </div>
                </div>
              </div>
            </section>

            <section class="battery-feature-column battery-feature-maintenance" aria-labelledby="battery-maintenance-title">
              <div class="battery-feature-card">
                <svg class="battery-card-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/></svg>
                <strong id="battery-maintenance-title">3. Minimal Maintenance</strong>
              </div>

              <div class="battery-mini-stage">
                <div class="waste-demo fade-in">
                  <div class="demo-text">
                    <h4>Maintenance Effort & Waste</h4>
                  </div>

                  <div class="waste-grid">
                    <!-- Standard Battery -->
                    <div class="waste-card standard">
                      <div class="card-glow-line"></div>
                      <div class="waste-badge">Standard Battery</div>
                      
                      <div class="battery-stack">
                        <div class="waste-item" style="--i:0"><div class="battery-icon-wrapper"><svg class="battery-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="1" y="6" width="18" height="12" rx="2" ry="2"></rect><line x1="23" y1="13" x2="23" y2="11"></line></svg><svg class="alert-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"></path><line x1="12" y1="9" x2="12" y2="13"></line><line x1="12" y1="17" x2="12.01" y2="17"></line></svg></div><span>Yr 2</span></div>
                        <div class="waste-item" style="--i:1"><div class="battery-icon-wrapper"><svg class="battery-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="1" y="6" width="18" height="12" rx="2" ry="2"></rect><line x1="23" y1="13" x2="23" y2="11"></line></svg><svg class="alert-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"></path><line x1="12" y1="9" x2="12" y2="13"></line><line x1="12" y1="17" x2="12.01" y2="17"></line></svg></div><span>Yr 4</span></div>
                        <div class="waste-item" style="--i:2"><div class="battery-icon-wrapper"><svg class="battery-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="1" y="6" width="18" height="12" rx="2" ry="2"></rect><line x1="23" y1="13" x2="23" y2="11"></line></svg><svg class="alert-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"></path><line x1="12" y1="9" x2="12" y2="13"></line><line x1="12" y1="17" x2="12.01" y2="17"></line></svg></div><span>Yr 6</span></div>
                        <div class="waste-item" style="--i:3"><div class="battery-icon-wrapper"><svg class="battery-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="1" y="6" width="18" height="12" rx="2" ry="2"></rect><line x1="23" y1="13" x2="23" y2="11"></line></svg><svg class="alert-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"></path><line x1="12" y1="9" x2="12" y2="13"></line><line x1="12" y1="17" x2="12.01" y2="17"></line></svg></div><span>Yr 8</span></div>
                        <div class="waste-item" style="--i:4"><div class="battery-icon-wrapper"><svg class="battery-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="1" y="6" width="18" height="12" rx="2" ry="2"></rect><line x1="23" y1="13" x2="23" y2="11"></line></svg><svg class="alert-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"></path><line x1="12" y1="9" x2="12" y2="13"></line><line x1="12" y1="17" x2="12.01" y2="17"></line></svg></div><span>Yr 10</span></div>
                      </div>

                      <div class="card-footer">
                        <div class="count">5 <span>Times</span></div>
                      </div>
                    </div>

                    <!-- 10-Year Battery -->
                    <div class="waste-card ours">
                      <div class="card-glow-line"></div>
                      <div class="card-blur-bg"></div>
                      <div class="waste-badge">10-Year Battery</div>

                      <div class="battery-hero-wrapper">
                        <div class="hero-glow animate-pulse"></div>
                        <div class="battery-hero-icon animate-float">
                          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="1" y="6" width="18" height="12" rx="2" ry="2"></rect><line x1="23" y1="13" x2="23" y2="11"></line></svg>
                          <div class="shield-overlay">
                            <svg viewBox="0 0 24 24" fill="currentColor" stroke="none"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path><polyline points="9 11 11 13 15 9"></polyline></svg>
                          </div>
                        </div>
                      </div>

                      <div class="card-footer">
                        <div class="count glowing">0 <span>Times</span></div>
                      </div>
                    </div>
                  </div>
                </div>
              </div>
            </section>
          </div>
        </div>
      </div>
    </section>
  </main>

  <script src="../js/page-messaging.js"></script>
</body>
</html>
