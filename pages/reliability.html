<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>High Reliability</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/page-base.css">
  <link rel="stylesheet" href="../css/pages/reliability.css">
  <link rel="stylesheet" href="../css/pages/reliability-animations.css">
</head>
<body>
  <main class="page page-reliability">
<section class="page-grid reliability-layout">
      <header class="reliability-header">
        <div class="page-copy reliability-hero reliability-hero-spotlight">
          <h2>High Reliability</h2>
        </div>
      </header>

      <div class="visual-card reliability-stage-shell">
        <div class="reliability-stage" aria-label="High reliability stage">
          <div class="reliability-stage-stack">
            <section class="reliability-substage reliability-substage-one-way" aria-labelledby="reliability-label-one-way">
              <span class="reliability-substage-label" id="reliability-label-one-way">Other Manufacturers</span>
              <div class="reliability-visual-map reliability-visual-map-one-way">
                <svg class="reli-connection-svg" id="reli-connection-layer-one-way"></svg>
                <div class="reli-animation-map" id="reli-animation-map-one-way"></div>
              </div>
            </section>

            <section class="reliability-substage reliability-substage-two-way" aria-labelledby="reliability-label-two-way">
              <span class="reliability-substage-label" id="reliability-label-two-way">Numens</span>
              <div class="reliability-visual-map reliability-visual-map-two-way">
                <svg class="reli-connection-svg" id="reli-connection-layer-two-way"></svg>
                <div class="reli-animation-map" id="reli-animation-map-two-way"></div>
              </div>
            </section>
          </div>
        </div>
      </div>
    </section>
  </main>
<script src="../js/page-messaging.js"></script>
  <script src="../js/pages/reliability-animations.js"></script>
</body>
</html>
