<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Easy Installation</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/page-base.css">
  <link rel="stylesheet" href="../css/pages/installation.css">
</head>
<body>
  <main class="page page-installation">
    <section class="page-grid installation-layout">
      <header class="installation-header">
        <div class="page-copy installation-hero installation-hero-spotlight page-hero-spotlight">
          <h2>Easy Installation</h2>
        </div>
      </header>

      <div class="visual-card installation-stage-shell">
        <div class="installation-container">
          <section class="stacked-comparison" aria-label="Easy Installation comparison preview">
            <article class="comparison-band comparison-band-before">
              <img src="../assets/images/wiring.jpg" class="band-image" alt="Traditional wiring installation">
              <div class="band-content">
                <h3 class="band-title">Traditional Wiring</h3>
              </div>
            </article>

            <div class="comparison-versus" aria-hidden="true">
              <span class="comparison-versus-inner">VS</span>
            </div>

            <article class="comparison-band comparison-band-after">
              <img src="../assets/images/wireless.jpg" class="band-image" alt="Wireless mesh installation">
              <div class="band-content">
                <h3 class="band-title">Numens Mesh Wireless</h3>
              </div>
            </article>
          </section>
        </div>
      </div>
    </section>
  </main>
  <script src="../js/page-messaging.js"></script>
</body>
</html>
