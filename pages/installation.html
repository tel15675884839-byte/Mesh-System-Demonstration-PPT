<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Easy Installation</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/page-base.css">
  <link rel="stylesheet" href="../css/pages/installation.css">
</head>
<body>
  <main class="page page-installation">
    <section class="page-grid installation-layout">
      <header class="installation-header">
        <div class="page-copy installation-hero installation-hero-spotlight">
          <p class="eyebrow">Core Advantage</p>
          <h2>Easy Installation</h2>
        </div>
      </header>

      <div class="visual-card installation-stage-shell">
        <div class="installation-stage" aria-label="Easy installation stage">
          <div class="installation-placeholder">
            <span class="installation-placeholder-label">[ Visual Demo Area for Easy Installation ]</span>
          </div>
          <div class="status-panel installation-status-panel">
            <p class="eyebrow">Core Note</p>
            <h3>Less cabling, faster setup</h3>
            <p>Less cabling means faster deployment, lowering labor and material costs while keeping the stage compact and easy to present.</p>
          </div>
        </div>
      </div>
    </section>
  </main>

  <script src="../js/page-messaging.js"></script>
</body>
</html>
