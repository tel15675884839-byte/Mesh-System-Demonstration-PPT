<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Easy Installation</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/page-base.css">
  <link rel="stylesheet" href="../css/pages/installation.css">
</head>
<body>
  <main class="page page-installation">
<section class="page-grid installation-layout">
      <header class="installation-header">
        <div class="page-copy installation-hero installation-hero-spotlight page-hero-spotlight">
          <h2>Easy Installation</h2>
        </div>
      </header>

      <div class="visual-card installation-stage-shell">
        <div class="installation-stage mode-wipe" id="wipeStage" aria-label="Easy installation stage">
          <div class="wipe-container">
            <img src="../assets/images/No%20Wiring%20Headahce.jpg" class="wipe-img" id="img-after" alt="No Wiring Headache">
            <img src="../assets/images/Wiring%20Headache.jpg" class="wipe-img" id="img-before" alt="Wiring Headache">
            
            <!-- Comparison Handle - Only the line remains -->
            <div class="wipe-handle">
              <div class="handle-line"></div>
            </div>
          </div>
        </div>
      </div>
    </section>
  </main>
<script src="../js/page-messaging.js"></script>
  <script src="../js/pages/installation-page.js"></script>
</body>
</html>
