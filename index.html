<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#02070d">
  <title>Wireless Mesh Fire Alarm System</title>
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" href="assets/branding/icon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=League+Spartan:wght@700;800&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css?v=20260415q">
  <link rel="stylesheet" href="css/welcome.css">
</head>
<body>
  <div class="welcome-shell">
    <div id="content-layer" class="content-layer" aria-hidden="true">
      <!-- intro-content-start -->
      <div class="stage-viewport">
        <div class="stage-scaler">
          <div class="app-shell fixed-stage">
            <div class="stage-background" aria-hidden="true">
              <div class="stage-cyber-background" data-cyber-bg data-cyber-bg-force-active aria-hidden="true">
                <canvas class="cyber-page-background-canvas"></canvas>
              </div>
              <div class="stage-backdrop">
                <div class="stage-slide stage-slide-1"></div>
                <div class="stage-slide stage-slide-2"></div>
                <div class="stage-slide stage-slide-3"></div>
              </div>
              <div class="stage-vignette"></div>
            </div>
            <header class="topbar">
              <div class="brand">
                <img class="brand-icon" src="assets/branding/icon.png" alt="Brand icon">
                <p class="brand-name">Wireless Mesh Fire Alarm System</p>
              </div>
              <div class="progress-wrap" aria-hidden="true">
                <div class="progress-bar">
                  <span class="progress-indicator" id="progress-indicator"></span>
                </div>
              </div>
            </header>

            <nav class="side-nav" aria-label="Slide navigation">
              <div class="nav-item">
                <span class="nav-label">Opening</span>
                <button class="nav-dot active" data-target="0" aria-label="Opening"></button>
              </div>
              <div class="nav-item">
                <span class="nav-label">Feature Overview</span>
                <button class="nav-dot" data-target="1" aria-label="Feature Overview"></button>
              </div>
              <div class="nav-item">
                <span class="nav-label">Mesh Communication</span>
                <button class="nav-dot" data-target="2" aria-label="Mesh Communication"></button>
              </div>
              <div class="nav-item">
                <span class="nav-label">High Reliability</span>
                <button class="nav-dot" data-target="3" aria-label="High Reliability"></button>
              </div>
              <div class="nav-item">
                <span class="nav-label">Rapid Response</span>
                <button class="nav-dot" data-target="4" aria-label="Rapid Response"></button>
              </div>
              <div class="nav-item">
                <span class="nav-label">Extended Distance</span>
                <button class="nav-dot" data-target="5" aria-label="Extended Distance"></button>
              </div>
              <div class="nav-item">
                <span class="nav-label">10-Year Battery</span>
                <button class="nav-dot" data-target="6" aria-label="10-Year Battery"></button>
              </div>
              <div class="nav-item">
                <span class="nav-label">Easy Installation</span>
                <button class="nav-dot" data-target="7" aria-label="Easy Installation"></button>
              </div>
              <div class="nav-item">
                <span class="nav-label">System Capacity</span>
                <button class="nav-dot" data-target="8" aria-label="System Capacity"></button>
              </div>
              <div class="nav-item">
                <span class="nav-label">Product Showcase</span>
                <button class="nav-dot" data-target="9" aria-label="Product Showcase"></button>
              </div>
            </nav>

            <main class="slides" id="slides">
              <section class="slide" data-slide="0">
                <div class="slide-frame-shell">
                  <iframe class="slide-frame" data-src="pages/opening.html" title="Opening" loading="eager"></iframe>
                </div>
              </section>

              <section class="slide" data-slide="1">
                <div class="slide-frame-shell">
                  <iframe class="slide-frame" data-src="pages/overview.html" title="Feature Overview" loading="eager"></iframe>
                </div>
              </section>

              <section class="slide" data-slide="2">
                <div class="slide-frame-shell">
                  <iframe class="slide-frame" data-src="pages/mesh.html?v=20260415e" title="Mesh Communication" loading="eager"></iframe>
                </div>
              </section>

              <section class="slide" data-slide="3">
                <div class="slide-frame-shell">
                  <iframe class="slide-frame" data-src="pages/reliability.html?v=20260415b" title="High Reliability" loading="lazy"></iframe>
                </div>
              </section>

              <section class="slide" data-slide="4">
                <div class="slide-frame-shell">
                  <iframe class="slide-frame" data-src="pages/response.html" title="Rapid Response" loading="lazy"></iframe>
                </div>
              </section>

              <section class="slide" data-slide="5">
                <div class="slide-frame-shell slide-frame-shell--distance-focus">
                  <iframe class="slide-frame" data-src="pages/distance.html?v=20260414c" title="Extended Distance" loading="lazy"></iframe>
                </div>
              </section>

              <section class="slide" data-slide="6">
                <div class="slide-frame-shell">
                  <iframe class="slide-frame" data-src="pages/battery.html" title="10-Year Battery" loading="lazy"></iframe>
                </div>
              </section>

              <section class="slide" data-slide="7">
                <div class="slide-frame-shell">
                  <iframe class="slide-frame" data-src="pages/installation.html" title="Easy Installation" loading="lazy"></iframe>
                </div>
              </section>

              <section class="slide" data-slide="8">
                <div class="slide-frame-shell">
                  <iframe class="slide-frame" data-src="pages/capacity.html" title="System Capacity" loading="lazy"></iframe>
                </div>
              </section>

              <section class="slide" data-slide="9">
                <div class="slide-frame-shell">
                  <iframe class="slide-frame" data-src="pages/product-showcase.html?v=20260415m" title="Product Showcase" loading="eager"></iframe>
                </div>
              </section>
            </main>
          </div>
        </div>
      </div>
      <!-- intro-content-end -->
    </div>

    <div id="bg-layer" class="background-layer" aria-hidden="true">
      <div class="welcome-backdrop">
        <div class="welcome-slide welcome-slide-1"></div>
        <div class="welcome-slide welcome-slide-2"></div>
        <div class="welcome-slide welcome-slide-3"></div>
      </div>

      <canvas id="spaceCanvas" class="space-canvas"></canvas>
      <div class="welcome-vignette"></div>
    </div>

    <main id="hero-layer" class="welcome-content" aria-label="Welcome screen">
      <header class="welcome-brand" aria-label="Mesh Technology brand">
        <img
          class="welcome-brand-logo"
          src="assets/branding/logo-long.png"
          alt="Mesh Technology logo"
        >
      </header>

      <h1 class="welcome-title style-3 style-3-bubble" data-text="Mesh Technology">Mesh Technology</h1>
    </main>
  </div>

  <script src="js/fixed-stage.js"></script>
  <script src="js/cyber-page-background.js?v=20260415k"></script>
  <script src="js/app.js?v=20260417a"></script>
  <script src="js/welcome.js"></script>
  <script>
    if ("serviceWorker" in navigator && window.isSecureContext) {
      window.addEventListener("load", function () {
        navigator.serviceWorker.register("service-worker.js").catch(function () {});
      });
    }
  </script>
</body>
</html>
