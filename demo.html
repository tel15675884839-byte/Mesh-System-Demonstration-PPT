<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mesh Network 框架</title>
    <style>
        body,
        html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #050508;
            /* 深邃的星空背景色 */
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        #ui-layer {
            position: absolute;
            top: 20px;
            left: 20px;
            color: #ffffff;
            pointer-events: none;
        }

        h1 {
            font-size: 24px;
            margin: 0 0 5px 0;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #00d2ff;
            text-shadow: 0 0 10px rgba(0, 210, 255, 0.5);
        }

        p {
            font-size: 14px;
            color: #8892b0;
            margin: 0;
        }
    </style>
</head>

<body>

    <div id="ui-layer">
        <h1>Mesh Network</h1>
        <p>交互: 🖱️ 左键点击粒子流切断线路 | ⌨️ Ctrl+左键点击红色故障线恢复</p>
    </div>

    <canvas id="meshCanvas"></canvas>

    <script>
        const canvas = document.getElementById('meshCanvas');
        const ctx = canvas.getContext('2d');

        let width = window.innerWidth;
        let height = window.innerHeight;
        let centerX = width / 2;
        let centerY = height / 2;

        canvas.width = width;
        canvas.height = height;

        window.addEventListener('resize', () => {
            width = window.innerWidth;
            height = window.innerHeight;
            centerX = width / 2;
            centerY = height / 2;
            canvas.width = width;
            canvas.height = height;
        });

        // 基础坐标缩放系数，适配不同屏幕
        const scale = Math.min(width / 1000, height / 800) * 1.2;

        // 定义节点数据 (参照原图的近似相对位置)
        const nodes = [
            // 3个主节点 (Main)
            { id: 0, type: 'main', x: 0, y: -160 },    // 顶部中心
            { id: 1, type: 'main', x: -180, y: 80 },   // 左下
            { id: 2, type: 'main', x: 180, y: 80 },    // 右下

            // 6个子节点 (Sub)
            { id: 3, type: 'sub', x: -220, y: -120 },  // 左上
            { id: 4, type: 'sub', x: 220, y: -120 },   // 右上
            { id: 5, type: 'sub', x: 0, y: -30 },      // 正中间小节点
            { id: 6, type: 'sub', x: -320, y: 140 },   // 最左下
            { id: 7, type: 'sub', x: 320, y: 140 },    // 最右下
            { id: 8, type: 'sub', x: 0, y: 220 }       // 底部正中
        ];

        // 定义线路/连接
        const edges = [
            // 主节点之间的蓝色连接 (核心骨干网)
            { source: 0, target: 1, type: 'main', active: true },
            { source: 1, target: 2, type: 'main', active: true },
            { source: 2, target: 0, type: 'main', active: true },

            // 子节点连接 (绿色连接)
            // 设定每个子节点当前只激活一条到主节点的路径进行数据传输
            { source: 3, target: 0, type: 'sub', active: true },
            { source: 3, target: 1, type: 'sub', active: false }, // 备用路径
            { source: 4, target: 0, type: 'sub', active: true },
            { source: 4, target: 2, type: 'sub', active: false }, // 备用路径
            { source: 5, target: 0, type: 'sub', active: true },
            { source: 5, target: 1, type: 'sub', active: false }, // 备用路径
            { source: 5, target: 2, type: 'sub', active: false }, // 备用路径
            { source: 6, target: 1, type: 'sub', active: true },
            { source: 7, target: 2, type: 'sub', active: true },
            { source: 8, target: 1, type: 'sub', active: true },
            { source: 8, target: 2, type: 'sub', active: false }  // 备用路径
        ];

        // 生成星空背景粒子
        const stars = Array.from({ length: 150 }, () => ({
            x: Math.random() * 2000 - 1000,
            y: Math.random() * 2000 - 1000,
            size: Math.random() * 1.5 + 0.5,
            opacity: Math.random()
        }));

        let time = 0; // 用于动画时间推移

        // 信号粒子数组
        let particles = [];
        // 水波纹特效数组
        let ripples = [];

        // 初始化信号粒子
        function initParticles() {
            particles = []; // 清空现有粒子
            // 为每条“激活”的线路创建几个处于不同进度的粒子
            edges.forEach(edge => {
                if (edge.active) {
                    const count = edge.type === 'main' ? 4 : 2; // 主线路粒子更密集
                    for (let i = 0; i < count; i++) {
                        particles.push({
                            edge: edge,
                            progress: i / count, // 进度 0 到 1 之间
                            speed: edge.type === 'main' ? 0.003 : 0.004 // 移动速度
                        });
                    }
                }
            });
        }
        initParticles();

        // 交互逻辑：点击断开并触发自愈，或Ctrl+点击恢复
        canvas.addEventListener('click', (event) => {
            const rect = canvas.getBoundingClientRect();
            const mouseX = event.clientX - rect.left;
            const mouseY = event.clientY - rect.top;

            // 检查是否点击了任何 'sub' 类型的线路
            let clickedEdge = null;

            for (let edge of edges) {
                if (edge.type === 'main') continue; // 目前只允许操作子节点线路

                const sourceNode = nodes.find(n => n.id === edge.source);
                const targetNode = nodes.find(n => n.id === edge.target);

                const sFloatY = Math.sin(time * 0.002 + sourceNode.id) * 5;
                const tFloatY = Math.sin(time * 0.002 + targetNode.id) * 5;

                const startX = centerX + sourceNode.x * scale;
                const startY = centerY + sourceNode.y * scale + sFloatY;
                const endX = centerX + targetNode.x * scale;
                const endY = centerY + targetNode.y * scale + tFloatY;

                // 简单的线段碰撞检测：计算鼠标点到线段的距离
                const dist = pointToLineDistance(mouseX, mouseY, startX, startY, endX, endY);

                if (dist < 15) { // 增加点击容差区域
                    clickedEdge = edge;
                    break;
                }
            }

            if (clickedEdge) {
                if (event.ctrlKey) {
                    // Ctrl + 左键：尝试恢复线路
                    if (clickedEdge.broken) {
                        recoverNetwork(clickedEdge);
                    }
                } else {
                    // 仅左键：尝试切断线路
                    if (clickedEdge.active) {
                        healNetwork(clickedEdge);
                    }
                }
            }
        });

        // 核心自愈逻辑 (断开)
        function healNetwork(brokenEdge) {
            // 1. 断开当前线路
            brokenEdge.active = false;
            brokenEdge.broken = true; // 标记为故障

            // 2. 寻找该子节点的备用线路
            const affectedSubNodeId = brokenEdge.source;
            const backupEdges = edges.filter(e =>
                e.source === affectedSubNodeId &&
                e !== brokenEdge &&
                !e.broken // 不选择之前已经坏掉的线
            );

            // 3. 激活备用线路
            if (backupEdges.length > 0) {
                // 选择第一个可用的备用线路
                backupEdges[0].active = true;
            } else {
                console.log(`子节点 ${affectedSubNodeId} 已完全断网！`);
                // 如果没有备用线路被激活，重新初始化时该节点将自动不再产生粒子
            }

            // 重新初始化粒子系统以反映新的路由状态
            initParticles();

            // 触发一个红色的视觉反馈，表示线路故障
            document.body.style.backgroundColor = '#1a0505';
            setTimeout(() => document.body.style.backgroundColor = '#050508', 150);

            // 触发断开时的水波纹涟漪
            ripples.push({ nodeId: affectedSubNodeId, radius: 0, maxRadius: 120, type: 'break' });
        }

        // 恢复网络逻辑
        function recoverNetwork(recoveredEdge) {
            recoveredEdge.broken = false;

            const affectedSubNodeId = recoveredEdge.source;

            // 检查该节点当前是否还有正在传输的线路
            const hasActiveEdge = edges.some(e => e.source === affectedSubNodeId && e.active);

            // 如果该节点目前处于完全断网状态，则直接激活刚修好的这条线
            if (!hasActiveEdge) {
                recoveredEdge.active = true;
            }

            initParticles();

            // 触发一个绿色的视觉反馈，表示线路恢复
            document.body.style.backgroundColor = '#051a0a';
            setTimeout(() => document.body.style.backgroundColor = '#050508', 150);

            // 触发恢复时的水波纹涟漪
            ripples.push({ nodeId: affectedSubNodeId, radius: 0, maxRadius: 120, type: 'recover' });
        }

        // 数学辅助函数：点到线段的最短距离
        function pointToLineDistance(px, py, x1, y1, x2, y2) {
            const A = px - x1;
            const B = py - y1;
            const C = x2 - x1;
            const D = y2 - y1;

            const dot = A * C + B * D;
            const len_sq = C * C + D * D;
            let param = -1;
            if (len_sq != 0) // 线段长度不为0
                param = dot / len_sq;

            let xx, yy;

            if (param < 0) {
                xx = x1;
                yy = y1;
            }
            else if (param > 1) {
                xx = x2;
                yy = y2;
            }
            else {
                xx = x1 + param * C;
                yy = y1 + param * D;
            }

            const dx = px - xx;
            const dy = py - yy;
            return Math.sqrt(dx * dx + dy * dy);
        }

        // 绘制具有科技感的节点图标
        function drawNode(node, currentX, currentY) {
            ctx.save();
            ctx.translate(currentX, currentY);

            // 浮动效果
            const floatY = Math.sin(time * 0.002 + node.id) * 5;
            ctx.translate(0, floatY);

            // 判断子节点是否完全断网
            let isDisconnected = false;
            if (node.type === 'sub') {
                const subEdges = edges.filter(e => e.source === node.id);
                // 如果该节点拥有的所有线路都被标记为 broken，则判定为断网
                if (subEdges.length > 0 && subEdges.every(e => e.broken)) {
                    isDisconnected = true;
                }
            }

            if (node.type === 'main') {
                // 主节点：较大，带有浅蓝色发光
                ctx.shadowBlur = 20;
                ctx.shadowColor = "rgba(173, 216, 230, 0.8)";

                // 绘制外壳
                ctx.fillStyle = "#e0e8f0";
                ctx.beginPath();
                ctx.roundRect(-30, -20, 60, 40, 8);
                ctx.fill();

                // 绘制内部细节线
                ctx.strokeStyle = "#4a6b8c";
                ctx.lineWidth = 2;
                ctx.shadowBlur = 0;
                ctx.beginPath();
                ctx.moveTo(-20, 0); ctx.lineTo(20, 0);
                ctx.moveTo(-15, -10); ctx.lineTo(15, -10);
                ctx.stroke();

                // 底部指示灯
                ctx.fillStyle = "#00d2ff";
                ctx.beginPath();
                ctx.arc(-15, 20, 3, 0, Math.PI * 2);
                ctx.arc(15, 20, 3, 0, Math.PI * 2);
                ctx.fill();

            } else {
                // 子节点：较小，带有白色/浅绿色发光
                if (isDisconnected) {
                    // 断网状态：失去发光，整体变为暗灰色
                    ctx.shadowBlur = 0;
                    ctx.fillStyle = "#4a4d52";
                } else {
                    // 正常状态
                    ctx.shadowBlur = 15;
                    ctx.shadowColor = "rgba(255, 255, 255, 0.6)";
                    ctx.fillStyle = "#d0d5dc";
                }

                // 绘制圆盘主体
                ctx.beginPath();
                ctx.ellipse(0, 0, 18, 12, 0, 0, Math.PI * 2);
                ctx.fill();

                // 顶部突起
                ctx.fillStyle = isDisconnected ? "#33363a" : "#a0a5b0";
                ctx.shadowBlur = 0;
                ctx.beginPath();
                ctx.arc(0, -6, 6, 0, Math.PI * 2);
                ctx.fill();

                // 底部连接器
                ctx.fillStyle = isDisconnected ? "#222" : "#808590";
                ctx.fillRect(-3, 8, 6, 6);
            }

            ctx.restore();
        }

        // 动画主循环
        function animate() {
            ctx.clearRect(0, 0, width, height);

            // 1. 绘制星空背景 (随时间缓慢闪烁和移动)
            ctx.fillStyle = "#ffffff";
            stars.forEach(star => {
                ctx.globalAlpha = Math.abs(Math.sin(time * 0.001 + star.x)) * 0.5 + 0.1;
                ctx.beginPath();
                // 让星空以中心点为基础，受缩放影响较小
                ctx.arc(centerX + star.x, centerY + star.y, star.size, 0, Math.PI * 2);
                ctx.fill();
            });
            ctx.globalAlpha = 1.0;

            // 2. 绘制线路 (Edges) - 改为静态的网状虚线 (保留所有连线可见)
            edges.forEach(edge => {
                const sourceNode = nodes.find(n => n.id === edge.source);
                const targetNode = nodes.find(n => n.id === edge.target);

                // 计算浮动后的实际坐标 (保持线条与节点连接紧密)
                const sFloatY = Math.sin(time * 0.002 + sourceNode.id) * 5;
                const tFloatY = Math.sin(time * 0.002 + targetNode.id) * 5;

                const startX = centerX + sourceNode.x * scale;
                const startY = centerY + sourceNode.y * scale + sFloatY;
                const endX = centerX + targetNode.x * scale;
                const endY = centerY + targetNode.y * scale + tFloatY;

                ctx.beginPath();
                ctx.moveTo(startX, startY);
                ctx.lineTo(endX, endY);

                // 让线条末端呈圆形，配合短线段形成原图中的圆点虚线效果
                ctx.lineCap = 'round';

                if (edge.type === 'main') {
                    // 主干网络
                    ctx.strokeStyle = edge.active ? "rgba(0, 136, 255, 0.6)" : "rgba(0, 136, 255, 0.25)";
                    ctx.lineWidth = 2.5;
                    ctx.setLineDash([4, 15]);
                } else {
                    // 子节点网络
                    if (edge.broken) {
                        // 如果被点击判定为故障，显示红色虚线
                        ctx.strokeStyle = "rgba(255, 50, 50, 0.5)";
                    } else {
                        ctx.strokeStyle = edge.active ? "rgba(0, 255, 102, 0.5)" : "rgba(0, 255, 102, 0.25)";
                    }
                    ctx.lineWidth = 2;
                    ctx.setLineDash([3, 12]);
                }

                ctx.stroke();

                // 重置样式，避免影响其他绘制
                ctx.shadowBlur = 0;
                ctx.setLineDash([]);
                ctx.lineCap = 'butt';

                // 绘制断开的警告图标
                if (edge.broken) {
                    const midX = (startX + endX) / 2;
                    const midY = (startY + endY) / 2;

                    ctx.save();
                    ctx.translate(midX, midY);

                    // 呼吸闪烁效果
                    const pulse = Math.abs(Math.sin(time * 0.005));

                    ctx.strokeStyle = `rgba(255, 50, 50, ${0.7 + pulse * 0.3})`;
                    ctx.lineWidth = 3;
                    ctx.lineCap = 'round';
                    ctx.shadowBlur = 15;
                    ctx.shadowColor = "rgba(255, 0, 0, 0.8)";

                    const size = 6 + pulse * 2; // 图标大小随呼吸微调

                    // 绘制 X 符号
                    ctx.beginPath();
                    ctx.moveTo(-size, -size);
                    ctx.lineTo(size, size);
                    ctx.moveTo(size, -size);
                    ctx.lineTo(-size, size);
                    ctx.stroke();

                    // 绘制外层圆圈
                    ctx.lineWidth = 1.5;
                    ctx.beginPath();
                    ctx.arc(0, 0, size + 5, 0, Math.PI * 2);
                    ctx.stroke();

                    ctx.restore();
                }
            });

            // 2.5 绘制信号粒子 (Particles) - 引入彗星尾迹特效
            particles.forEach(p => {
                p.progress += p.speed;
                if (p.progress >= 1) p.progress = 0; // 进度满1后重置为0，形成循环

                const sourceNode = nodes.find(n => n.id === p.edge.source);
                const targetNode = nodes.find(n => n.id === p.edge.target);

                const sFloatY = Math.sin(time * 0.002 + sourceNode.id) * 5;
                const tFloatY = Math.sin(time * 0.002 + targetNode.id) * 5;

                const startX = centerX + sourceNode.x * scale;
                const startY = centerY + sourceNode.y * scale + sFloatY;
                const endX = centerX + targetNode.x * scale;
                const endY = centerY + targetNode.y * scale + tFloatY;

                // 绘制拖尾效果 (生成多个逐渐变小、变透明的尾随圆圈)
                const trailLength = 8;
                for (let j = trailLength; j >= 0; j--) {
                    // 计算尾迹所在进度
                    let tProg = p.progress - (j * 0.008);
                    if (tProg < 0) continue; // 如果还没从起点发出，则不绘制这段尾迹

                    const currentX = startX + (endX - startX) * tProg;
                    const currentY = startY + (endY - startY) * tProg;

                    const alpha = 1 - (j / trailLength);
                    const baseRadius = p.edge.type === 'main' ? 3.5 : 2.5;
                    const radius = Math.max(baseRadius * alpha, 0.5);

                    ctx.beginPath();
                    ctx.arc(currentX, currentY, radius, 0, Math.PI * 2);

                    if (j === 0) {
                        // 头部的发光主粒子
                        if (p.edge.type === 'main') {
                            ctx.fillStyle = "#00d2ff";
                            ctx.shadowColor = "#00d2ff";
                            ctx.shadowBlur = 15;
                        } else {
                            ctx.fillStyle = "#00ff66";
                            ctx.shadowColor = "#00ff66";
                            ctx.shadowBlur = 10;
                        }
                    } else {
                        // 身后的半透明拖尾（去除阴影优化性能）
                        ctx.shadowBlur = 0;
                        if (p.edge.type === 'main') {
                            ctx.fillStyle = `rgba(0, 210, 255, ${alpha * 0.5})`;
                        } else {
                            ctx.fillStyle = `rgba(0, 255, 102, ${alpha * 0.5})`;
                        }
                    }
                    ctx.fill();
                }
                ctx.shadowBlur = 0; // 重置阴影
            });

            // 2.8 绘制水波纹涟漪 (Ripples)
            for (let i = ripples.length - 1; i >= 0; i--) {
                let r = ripples[i];
                r.radius += 3; // 波纹扩散速度
                let alpha = 1 - (r.radius / r.maxRadius);

                // 如果透明度降到0以下，从数组中移除该特效
                if (alpha <= 0) {
                    ripples.splice(i, 1);
                    continue;
                }

                const node = nodes.find(n => n.id === r.nodeId);
                const nX = centerX + node.x * scale;
                const nY = centerY + node.y * scale + Math.sin(time * 0.002 + node.id) * 5; // 追踪节点当前浮动位置

                ctx.beginPath();
                ctx.arc(nX, nY, r.radius, 0, Math.PI * 2);
                ctx.strokeStyle = r.type === 'break' ? `rgba(255, 50, 50, ${alpha})` : `rgba(0, 255, 102, ${alpha})`;
                ctx.lineWidth = 3 * alpha; // 越到边缘线越细
                ctx.stroke();
            }

            // 3. 绘制节点 (Nodes)
            // 在线条之后绘制，确保节点在线条上方
            nodes.forEach(node => {
                const currentX = centerX + node.x * scale;
                const currentY = centerY + node.y * scale;
                drawNode(node, currentX, currentY);
            });

            time += 16; // 假设60fps，每次增加16ms
            requestAnimationFrame(animate);
        }

        // 启动动画
        animate();

    </script>
</body>

</html>
