<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Numens Wireless Products Showcase</title>
    <!-- 引入 Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --bg-dark: #0a0b10;
            --brand-red: #e6192b;
            /* Numens 标志性的红色 */
            --brand-red-glow: rgba(230, 25, 43, 0.4);
            --card-bg: rgba(25, 27, 35, 0.7);
            --text-main: #ffffff;
            --text-muted: #8892b0;
            --border-color: rgba(255, 255, 255, 0.1);
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-dark);
            background-image:
                radial-gradient(circle at 15% 50%, rgba(230, 25, 43, 0.08), transparent 25%),
                radial-gradient(circle at 85% 30%, rgba(0, 229, 255, 0.05), transparent 25%);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* 顶部品牌与标题 */
        header {
            padding: 30px 50px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 10;
        }

        .logo {
            font-size: 24px;
            font-weight: 900;
            color: var(--brand-red);
            display: flex;
            align-items: center;
            gap: 10px;
            font-style: italic;
            letter-spacing: 2px;
        }

        .logo svg {
            width: 32px;
            height: 32px;
        }

        .title-badge {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border-color);
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 14px;
            color: var(--text-muted);
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        /* 主体展示区 */
        main {
            flex: 1;
            display: flex;
            padding: 0 50px;
            gap: 60px;
            align-items: center;
            position: relative;
        }

        /* 左侧产品图展示 */
        .product-visual {
            flex: 0.45;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        /* 产品背后的发光圆环 */
        .glow-ring {
            position: absolute;
            width: 350px;
            height: 350px;
            border-radius: 50%;
            background: radial-gradient(circle, var(--brand-red-glow) 0%, transparent 70%);
            z-index: 1;
            transition: all 0.5s ease;
        }

        .product-image-container {
            position: relative;
            z-index: 2;
            width: 320px;
            height: 320px;
            /* 模拟一个悬浮的红色设备 */
            background: linear-gradient(135deg, #ff3344, #b30011);
            border-radius: 20px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.6), inset 0 2px 10px rgba(255, 255, 255, 0.3);
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 20px;
            font-weight: bold;
            color: rgba(255, 255, 255, 0.9);
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.5);
            transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.5s;
        }

        /* 倒影效果 */
        .product-image-container::after {
            content: '';
            position: absolute;
            bottom: -340px;
            left: 0;
            width: 100%;
            height: 100%;
            background: inherit;
            border-radius: inherit;
            transform: scaleY(-1);
            mask-image: linear-gradient(to bottom, rgba(0, 0, 0, 0.4) 0%, transparent 40%);
            -webkit-mask-image: linear-gradient(to bottom, rgba(0, 0, 0, 0.4) 0%, transparent 40%);
            opacity: 0.6;
        }

        /* 右侧详情面板 */
        .product-details {
            flex: 0.55;
            display: flex;
            flex-direction: column;
            gap: 30px;
            opacity: 0;
            transform: translateX(30px);
            animation: slideIn 0.6s cubic-bezier(0.4, 0, 0.2, 1) forwards;
        }

        @keyframes slideIn {
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .product-title {
            font-size: 48px;
            font-weight: 700;
            margin: 0;
            line-height: 1.1;
            position: relative;
            display: inline-block;
        }

        /* 标题下的科技感红线 */
        .product-title::after {
            content: '';
            position: absolute;
            bottom: -15px;
            left: 0;
            width: 60px;
            height: 4px;
            background: var(--brand-red);
            border-radius: 2px;
            box-shadow: 0 0 10px var(--brand-red);
        }

        /* 参数卡片网格 (Bento Grid) */
        .features-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            margin-top: 20px;
        }

        .feature-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            padding: 20px;
            border-radius: 16px;
            backdrop-filter: blur(10px);
            display: flex;
            align-items: flex-start;
            gap: 15px;
            transition: transform 0.3s, background 0.3s, border-color 0.3s;
        }

        .feature-card:hover {
            transform: translateY(-5px);
            background: rgba(35, 38, 48, 0.8);
            border-color: rgba(230, 25, 43, 0.5);
        }

        .feature-icon {
            color: var(--brand-red);
            background: rgba(230, 25, 43, 0.1);
            padding: 10px;
            border-radius: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .feature-content h4 {
            margin: 0 0 5px 0;
            font-size: 14px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .feature-content p {
            margin: 0;
            font-size: 18px;
            font-weight: 500;
            color: var(--text-main);
        }

        /* 底部设备切换轨道 */
        footer {
            height: 120px;
            padding: 0 50px 30px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            z-index: 10;
        }

        .thumb-btn {
            background: transparent;
            border: 2px solid transparent;
            padding: 10px 20px;
            border-radius: 12px;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.3s;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }

        .thumb-btn .indicator {
            width: 30px;
            height: 4px;
            background: #333;
            border-radius: 2px;
            transition: all 0.3s;
        }

        .thumb-btn:hover {
            color: var(--text-main);
        }

        .thumb-btn:hover .indicator {
            background: #555;
        }

        .thumb-btn.active {
            color: var(--text-main);
        }

        .thumb-btn.active .indicator {
            background: var(--brand-red);
            box-shadow: 0 0 10px var(--brand-red-glow);
            width: 40px;
        }

        /* 动画类 */
        .fade-out {
            opacity: 0;
            transform: scale(0.95);
        }

        .fade-in {
            opacity: 1;
            transform: scale(1);
        }
    </style>
</head>

<body>

    <header>
        <div class="logo">
            <!-- 模拟火焰 Logo -->
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                stroke-linejoin="round">
                <path
                    d="M8.5 14.5A2.5 2.5 0 0 0 11 12c0-1.38-.5-2-1-3-1.072-2.143-.224-4.054 2-6 .5 2.5 2 4.9 4 6.5 2 1.6 3 3.5 3 5.5a7 7 0 1 1-14 0c0-1.153.433-2.294 1-3a2.5 2.5 0 0 0 2.5 2.5z">
                </path>
            </svg>
            NUMENS
        </div>
        <div class="title-badge">Product Showcase 2026</div>
    </header>

    <main>
        <div class="product-visual">
            <div class="glow-ring"></div>
            <div class="product-image-container" id="product-img">
            </div>
        </div>

        <div class="product-details" id="product-details">
            <!-- 内容由 JS 动态渲染 -->
        </div>
    </main>

    <footer>
        <button class="thumb-btn active" onclick="switchProduct(0)">
            <div class="indicator"></div>
            Call Point
        </button>
        <button class="thumb-btn" onclick="switchProduct(1)">
            <div class="indicator"></div>
            A/V Alarms
        </button>
        <button class="thumb-btn" onclick="switchProduct(2)">
            <div class="indicator"></div>
            I/O Module
        </button>
        <button class="thumb-btn" onclick="switchProduct(3)">
            <div class="indicator"></div>
            Detectors
        </button>
        <button class="thumb-btn" onclick="switchProduct(4)">
            <div class="indicator"></div>
            Leader/Node
        </button>
        <button class="thumb-btn" onclick="switchProduct(5)">
            <div class="indicator"></div>
            Expansion Card
        </button>
    </footer>

    <script>
        // 初始化 Lucide 图标
        lucide.createIcons();

        // 产品数据结构 (提取自您的 PPT 图片)
        const products = [
            {
                title: "Wireless Manual Call Point",
                imgText: "Call Point Image",
                color: "linear-gradient(135deg, #ff3344, #b30011)",
                features: [
                    { icon: "battery-charging", label: "Power Source", value: "10-year Lithium battery" },
                    { icon: "radio-tower", label: "Antenna", value: "Internal antenna" },
                    { icon: "network", label: "Topology", value: "Mesh Communication" },
                    { icon: "ruler", label: "Range", value: "500m (in open area)" }
                ]
            },
            {
                title: "Wireless Audio/Visual Alarms",
                imgText: "A/V Alarm Image",
                color: "linear-gradient(135deg, #ff4d4d, #cc0000)",
                features: [
                    { icon: "volume-2", label: "Models Available", value: "Audible, visual, audio/visual" },
                    { icon: "battery", label: "Power Source", value: "Lithium batteries" },
                    { icon: "network", label: "Topology", value: "Mesh Communication" },
                    { icon: "shield-check", label: "Enclosure", value: "Weatherproof (IP-65)" }
                ]
            },
            {
                title: "Wireless Input/Output Module",
                imgText: "I/O Module Image",
                color: "linear-gradient(135deg, #e0e0e0, #9e9e9e)", // 白色/灰色外壳
                features: [
                    { icon: "battery-charging", label: "Power Source", value: "10-year Lithium battery" },
                    { icon: "radio-tower", label: "Antenna", value: "Internal antenna" },
                    { icon: "network", label: "Topology", value: "Mesh Communication" },
                    { icon: "ruler", label: "Range", value: "500m (in open area)" }
                ]
            },
            {
                title: "Wireless Detectors",
                imgText: "Detector Image",
                color: "linear-gradient(135deg, #f5f5f5, #bdbdbd)", // 白色外壳
                features: [
                    { icon: "flame", label: "Detection Type", value: "Smoke, heat or smoke/heat" },
                    { icon: "battery-charging", label: "Power Source", value: "10-year Lithium battery" },
                    { icon: "network", label: "Topology", value: "Mesh Communication" },
                    { icon: "ruler", label: "Range", value: "500m (in open area)" }
                ]
            },
            {
                title: "Wireless Leader/Node",
                imgText: "Leader Node Image",
                color: "linear-gradient(135deg, #e0e0e0, #9e9e9e)", // 白色外壳
                features: [
                    { icon: "plug", label: "Power Input", value: "DC 24 V" },
                    { icon: "activity", label: "Monitoring", value: "Quiescent, alarm, fault" },
                    { icon: "cpu", label: "Capacity", value: "32 devices supported" },
                    { icon: "network", label: "Topology", value: "Mesh Communication" }
                ]
            },
            {
                title: "Wireless Loop Expansion Card",
                imgText: "PCB Board Image",
                color: "linear-gradient(135deg, #4caf50, #2e7d32)", // 绿色 PCB 板
                features: [
                    { icon: "server", label: "Installation", value: "Installed in the CIE" },
                    { icon: "layers", label: "Loop Support", value: "Up to 4 wireless loops" },
                    { icon: "users", label: "Device Capacity", value: "125 devices per loop" },
                    { icon: "git-merge", label: "Node Structure", value: "1 leader + 31 nodes per loop" }
                ]
            }
        ];

        // 渲染产品内容
        function renderProduct(index) {
            const product = products[index];
            const detailsContainer = document.getElementById('product-details');
            const imgContainer = document.getElementById('product-img');

            // 1. 生成右侧 HTML (重置动画)
            detailsContainer.style.animation = 'none';
            detailsContainer.offsetHeight; // 触发重绘

            let featuresHtml = product.features.map(f => `
                <div class="feature-card">
                    <div class="feature-icon">
                        <i data-lucide="${f.icon}"></i>
                    </div>
                    <div class="feature-content">
                        <h4>${f.label}</h4>
                        <p>${f.value}</p>
                    </div>
                </div>
            `).join('');

            detailsContainer.innerHTML = `
                <h1 class="product-title">${product.title}</h1>
                <div class="features-grid">
                    ${featuresHtml}
                </div>
            `;
            detailsContainer.style.animation = 'slideIn 0.6s cubic-bezier(0.4, 0, 0.2, 1) forwards';

            // 2. 更新左侧图片占位 (模拟图片切换)
            imgContainer.style.background = product.color;
            imgContainer.innerHTML = ` || 'Product'}]`;

            // 3. 重新渲染新插入的图标
            lucide.createIcons();
        }

        // 切换产品事件
        function switchProduct(index) {
            // 更新按钮状态
            document.querySelectorAll('.thumb-btn').forEach((btn, i) => {
                if (i === index) btn.classList.add('active');
                else btn.classList.remove('active');
            });

            // 添加淡出动画
            const imgContainer = document.getElementById('product-img');
            imgContainer.classList.add('fade-out');

            setTimeout(() => {
                renderProduct(index);
                imgContainer.classList.remove('fade-out');
            }, 250);
        }

        // 初始化加载第一个产品
        window.onload = () => {
            renderProduct(0);
        };
    </script>
</body>

</html>
