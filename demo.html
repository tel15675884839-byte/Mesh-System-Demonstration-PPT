<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>系统容量 - 网络级互联展示</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --primary-blue: #0ea5e9;
            --dark-bg: #0f172a;
        }

        body {
            background-color: var(--dark-bg);
            color: #f1f5f9;
            font-family: 'Inter', system-ui, sans-serif;
            overflow: hidden;
            cursor: pointer;
        }

        /* 装饰性背景网格 */
        .grid-bg {
            background-image: radial-gradient(circle at 2px 2px, rgba(255, 255, 255, 0.05) 1px, transparent 0);
            background-size: 40px 40px;
        }

        /* CIE 控制面板样式 */
        .cie-panel {
            width: 60px;
            height: 80px;
            background: linear-gradient(135deg, #334155 0%, #1e293b 100%);
            border: 2px solid #475569;
            border-radius: 4px;
            position: absolute;
            transition: all 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            opacity: 0;
            transform: translateY(-500px);
            /* 初始位置在屏幕外 */
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.5);
        }

        .cie-panel::after {
            content: '';
            position: absolute;
            top: 10px;
            left: 10px;
            right: 10px;
            height: 15px;
            background: #0f172a;
            border: 1px solid #334155;
        }

        /* 标签动画 */
        .cie-label {
            position: absolute;
            top: -50px;
            left: 50%;
            transform: translateX(-50%);
            white-space: nowrap;
            background: rgba(14, 165, 233, 0.9);
            padding: 4px 10px;
            border-radius: 4px;
            font-size: 10px;
            font-weight: bold;
            opacity: 0;
            transition: all 0.5s ease;
            pointer-events: none;
        }

        /* 连线样式 */
        .network-line {
            position: absolute;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--primary-blue), transparent);
            opacity: 0;
            transition: opacity 1s ease;
            z-index: -1;
        }

        /* 设备粒子动画 */
        .device-particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: var(--primary-blue);
            border-radius: 50%;
            filter: blur(1px);
            z-index: 50;
        }

        /* 总计计数器样式 */
        #total-counter {
            transition: all 0.5s ease;
            transform: scale(0.5);
            opacity: 0;
        }

        .active-counter {
            transform: scale(1) !important;
            opacity: 1 !important;
        }

        /* 点击提示 */
        .click-hint {
            position: fixed;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            animation: bounce 2s infinite;
            color: #64748b;
            font-size: 14px;
        }

        @keyframes bounce {

            0%,
            20%,
            50%,
            80%,
            100% {
                transform: translateX(-50%) translateY(0);
            }

            40% {
                transform: translateX(-50%) translateY(-10px);
            }

            60% {
                transform: translateX(-50%) translateY(-5px);
            }
        }
    </style>
</head>

<body class="grid-bg min-h-screen flex flex-col items-center justify-center overflow-hidden" onclick="nextStep()">

    <header class="fixed top-12 text-center pointer-events-none">
        <h1 class="text-4xl font-black tracking-tighter text-white uppercase">Network <span
                class="text-sky-500">Level</span></h1>
        <p id="step-desc" class="text-slate-500 mt-2">点击页面开始部署网络互联</p>
    </header>

    <!-- 核心展示区域 -->
    <div id="canvas" class="relative w-full max-w-5xl h-[500px]">
        <!-- CIE 控制器将由 JS 动态生成 -->

        <!-- 中央汇聚点 -->
        <div id="hub"
            class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-4 h-4 rounded-full bg-sky-500/20">
            <div id="total-counter" class="text-center">
                <div class="text-6xl font-black text-white leading-none" id="count-num">0</div>
                <div class="text-sky-500 font-bold tracking-widest uppercase">Total Wireless Devices</div>
            </div>
        </div>
    </div>

    <div class="click-hint">点击屏幕继续下一步</div>

    <script>
        let currentStep = 0;
        const canvas = document.getElementById('canvas');
        const cieCount = 8;
        const cies = [];
        const lines = [];

        // 初始化 8 个 CIE
        function initCIEs() {
            const centerX = canvas.clientWidth / 2;
            const centerY = canvas.clientHeight / 2 + 50;
            const radius = 350;
            const startAngle = Math.PI + 0.5; // 从左侧开始
            const endAngle = 2 * Math.PI - 0.5; // 到右侧结束
            const stepAngle = (endAngle - startAngle) / (cieCount - 1);

            for (let i = 0; i < cieCount; i++) {
                const angle = startAngle + i * stepAngle;
                const x = centerX + Math.cos(angle) * radius;
                const y = centerY + Math.sin(angle) * radius;

                const cie = document.createElement('div');
                cie.className = 'cie-panel';
                cie.style.left = `${x - 30}px`;
                cie.style.top = `${y - 40}px`;
                cie.dataset.targetY = y - 40;

                const label = document.createElement('div');
                label.className = 'cie-label';
                label.innerText = '2 WIRELESS LOOP : 250 DEVICES';
                cie.appendChild(label);

                canvas.appendChild(cie);
                cies.push({ element: cie, label: label, x: x, y: y });
            }
        }

        function nextStep() {
            currentStep++;
            const desc = document.getElementById('step-desc');

            if (currentStep === 1) {
                desc.innerText = "Step 01: CIE 部署与网络互联中...";
                cies.forEach((cie, index) => {
                    setTimeout(() => {
                        cie.element.style.opacity = '1';
                        cie.element.style.transform = 'translateY(0)';

                        // 连接线逻辑
                        if (index > 0) {
                            drawConnection(cies[index - 1], cie);
                        }
                    }, index * 200);
                });
            }
            else if (currentStep === 2) {
                desc.innerText = "Step 02: 读取节点配置信息...";
                cies.forEach((cie, index) => {
                    setTimeout(() => {
                        cie.label.style.opacity = '1';
                        cie.label.style.transform = 'translateX(-50%) translateY(-10px)';
                    }, index * 100);
                });
            }
            else if (currentStep === 3) {
                desc.innerText = "Step 03: 全系统终端容量汇聚...";
                animateDeviceAggregation();
            }
            else {
                // 重置
                location.reload();
            }
        }

        function drawConnection(cieA, cieB) {
            const line = document.createElement('div');
            line.className = 'network-line';

            const dx = cieB.x - cieA.x;
            const dy = cieB.y - cieA.y;
            const dist = Math.sqrt(dx * dx + dy * dy);
            const angle = Math.atan2(dy, dx) * 180 / Math.PI;

            line.style.width = `${dist}px`;
            line.style.left = `${cieA.x}px`;
            line.style.top = `${cieA.y}px`;
            line.style.transformOrigin = '0 50%';
            line.style.transform = `rotate(${angle}deg)`;

            canvas.appendChild(line);
            setTimeout(() => line.style.opacity = '0.3', 500);
        }

        function animateDeviceAggregation() {
            const counter = document.getElementById('total-counter');
            const countNum = document.getElementById('count-num');
            counter.classList.add('active-counter');

            cies.forEach((cie, cieIndex) => {
                // 每个 CIE 发出 10 个粒子代表设备群
                for (let i = 0; i < 10; i++) {
                    setTimeout(() => {
                        createParticle(cie.x, cie.y);
                    }, cieIndex * 100 + i * 50);
                }
            });

            // 数字滚动动画
            let currentCount = 0;
            const targetTotal = 2000;
            const duration = 2500;
            const startTime = performance.now();

            function updateCount(timestamp) {
                const elapsed = timestamp - startTime;
                const progress = Math.min(elapsed / duration, 1);
                currentCount = Math.floor(progress * targetTotal);
                countNum.innerText = currentCount.toLocaleString();

                if (progress < 1) {
                    requestAnimationFrame(updateCount);
                } else {
                    countNum.classList.add('text-sky-400');
                    countNum.style.textShadow = '0 0 30px rgba(14, 165, 233, 0.8)';
                }
            }
            requestAnimationFrame(updateCount);
        }

        function createParticle(startX, startY) {
            const p = document.createElement('div');
            p.className = 'device-particle';
            p.style.left = `${startX}px`;
            p.style.top = `${startY}px`;
            canvas.appendChild(p);

            const targetX = canvas.clientWidth / 2;
            const targetY = canvas.clientHeight / 2;

            const anim = p.animate([
                { left: `${startX}px`, top: `${startY}px`, opacity: 1 },
                { left: `${targetX}px`, top: `${targetY}px`, opacity: 0 }
            ], {
                duration: 1000 + Math.random() * 1000,
                easing: 'cubic-bezier(0.4, 0, 0.2, 1)'
            });

            anim.onfinish = () => p.remove();
        }

        window.onload = initCIEs;
    </script>
</body>

</html>
